<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport">
    <title>Кнопки «Нравится/Не нравится»</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <div class="container">
        <div class="reaction-buttons">
            <audio id="lik" src="sound\imbo-otryzhka.mp3"></audio>
            <button id="likeButton" class="reaction-button like">
                <span class="icon">👍</span>
                <span class="text">Нравится</span>
            </button>
            <audio id="dis" src="sound\am-niam-grustit.mp3"></audio>
            <button id="dislikeButton" class="reaction-button dislike">
                <span class="icon">👎</span>
                <span class="text">Не нравится</span>
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
